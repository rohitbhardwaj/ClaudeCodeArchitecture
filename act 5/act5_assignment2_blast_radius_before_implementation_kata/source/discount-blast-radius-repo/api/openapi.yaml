openapi: 3.0.0
info:
  title: Checkout API
  version: 1.0.0

components:
  schemas:
    Receipt:
      type: object
      properties:
        subtotalCents:
          type: integer
        taxCents:
          type: integer
        totalCents:
          type: integer
        discountCode:
          type: string
        discountAmountCents:
          type: integer
        discountReasonCode:
          type: string

# Blast-radius note:
# Discount codes may change API receipt fields and reason codes.
