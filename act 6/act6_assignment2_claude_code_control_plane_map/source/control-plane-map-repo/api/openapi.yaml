openapi: 3.0.0
info:
  title: Checkout API
  version: 1.0.0

paths:
  /checkout:
    post:
      responses:
        '200':
          description: Checkout result

components:
  schemas:
    CheckoutResponse:
      type: object
      properties:
        errorCode:
          type: string
          enum:
            - OK
            - INVALID_COUPON
            - PAYMENT_DECLINED

# API contract rule:
# Public error codes require API owner approval to change.
